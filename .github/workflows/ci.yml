name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run type-check

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '20.x'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: 'pk_test_mock'
          CLERK_SECRET_KEY: 'sk_test_mock'
          NEXT_PUBLIC_SUPABASE_URL: 'https://mock.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'mock_anon_key'

      - name: Verify build artifacts exist
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed: .next directory does not exist!"
            exit 1
          fi
          if [ -z "$(ls -A .next)" ]; then
            echo "Build failed: .next directory is empty!"
            exit 1
          fi
          echo "Build verification complete - .next directory exists with content"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: .next/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level moderate

      - name: Run dependency check
        run: npx --yes license-checker --summary

  performance:
    name: Performance Analysis
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: .next/

      - name: Analyze bundle size
        run: |
          echo "Analyzing bundle size..."
          du -sh .next/static/ || echo "No static directory found"
          ls -la .next/ || echo "No .next directory found"
          find .next -name "*.js" -exec du -h {} + | sort -hr | head -10 || echo "No JS files found"
        
      - name: Comment performance info
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            try {
              // Get bundle size info from .next directory
              const staticSize = execSync('du -sh .next/static/ 2>/dev/null || echo "0B"').toString().trim();
              const totalSize = execSync('du -sh .next/ 2>/dev/null || echo "0B"').toString().trim();
              
              const comment = `
              ## 📊 Performance Analysis
              
              **Build metrics for this PR:**
              
              - **Static Assets Size**: ${staticSize.split('\t')[0]}
              - **Total Build Size**: ${totalSize.split('\t')[0]}
              - **Build Status**: ✅ Successful
              
              > 🔍 Build artifacts are available and verified
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Performance analysis failed:', error.message);
              
              const fallbackComment = `
              ## 📊 Performance Analysis
              
              ⚠️ Unable to generate detailed performance metrics, but build completed successfully.
              
              Build artifacts are available for download.
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: fallbackComment
              });
            }

  accessibility:
    name: Accessibility Testing
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: .next/

      - name: Install Pa11y for accessibility testing
        run: npm install -g pa11y

      - name: Start application
        run: npm start &
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: 'pk_test_mock'
          CLERK_SECRET_KEY: 'sk_test_mock'
          NEXT_PUBLIC_SUPABASE_URL: 'https://mock.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'mock_anon_key'

      - name: Wait for application
        run: npx wait-on http://localhost:3000

      - name: Run accessibility tests
        run: |
          pa11y http://localhost:3000 --reporter json > accessibility-report.json || true

      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: accessibility-report.json
